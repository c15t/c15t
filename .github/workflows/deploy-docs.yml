name: Deploy Docs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'docs/**'
      - 'packages/**'
      - 'changelog/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        type: choice
        options:
          - production
          - staging
          - preview
      pr_number:
        description: 'PR number for preview deployment (required if environment is preview)'
        required: false
        type: string
permissions: {}
jobs:
  check-secrets:
    name: 🔎 Check Docs Deploy Secrets
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - name: 🔎 Check preview deploy secrets
        id: check
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          DOCS_REPO: ${{ secrets.DOCS_REPO }}
        run: |
          if [ -n "$DOCS_DEPLOY_TOKEN" ] && [ -n "$DOCS_REPO" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================================
  # PREVIEW DEPLOYMENTS (for PRs)
  # pull_request_target has access to secrets; only same-repo PRs auto-trigger so
  # fork PRs cannot drive repository-dispatch with arbitrary head SHAs. Fork
  # previews: use workflow_dispatch → preview with the PR number (maintainers).
  # ============================================================================
  trigger-preview:
    name: 🔍 Trigger Preview
    needs: check-secrets
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: 📤 Trigger docs preview
        id: trigger_preview
        if: needs.check-secrets.outputs.available == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          repository: ${{ secrets.DOCS_REPO }}
          event-type: docs-preview
          client-payload: |
            {
              "pr_number": "${{ github.event.pull_request.number }}",
              "branch": "${{ github.head_ref }}",
              "repo": "${{ github.repository }}",
              "sha": "${{ github.event.pull_request.head.sha }}",
              "action": "${{ github.event.action }}"
            }

      - name: 📝 Summary
        if: always()
        run: |
          if [ "${{ needs.check-secrets.outputs.available }}" != "true" ]; then
            echo "### ⚠️ Docs Preview Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Required preview deployment secrets are not configured for this run." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.trigger_preview.outcome }}" = "success" ]; then
            echo "### 🔄 Docs Preview Triggered" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "A preview deployment has been triggered. Watch for a comment on this PR with the preview URL." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.trigger_preview.outcome }}" = "failure" ]; then
            echo "### ❌ Docs Preview Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The docs preview dispatch failed. Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Docs Preview Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The docs preview dispatch was skipped." >> $GITHUB_STEP_SUMMARY
          fi

  notify-close:
    name: 🧹 Notify PR Closed
    needs: check-secrets
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: 📤 Notify docs repo of PR close
        id: notify_close
        if: needs.check-secrets.outputs.available == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          repository: ${{ secrets.DOCS_REPO }}
          event-type: docs-preview
          client-payload: |
            {
              "pr_number": "${{ github.event.pull_request.number }}",
              "branch": "${{ github.head_ref }}",
              "repo": "${{ github.repository }}",
              "sha": "${{ github.event.pull_request.head.sha }}",
              "action": "closed"
            }

      - name: 📝 Summary
        if: always()
        run: |
          if [ "${{ needs.check-secrets.outputs.available }}" != "true" ]; then
            echo "### ⚠️ Docs Close Notification Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Required preview deployment secrets are not configured for this run." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.notify_close.outcome }}" = "success" ]; then
            echo "### 🧹 Docs Preview Notified" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The docs repo has been notified that the PR was closed." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.notify_close.outcome }}" = "failure" ]; then
            echo "### ❌ Docs Close Notification Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The docs repo close notification failed. Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Docs Close Notification Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The docs repo close notification was skipped." >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # MANUAL PREVIEW DEPLOYMENT (workflow_dispatch with PR number)
  # ============================================================================
  trigger-manual-preview:
    name: 🔍 Trigger Manual Preview
    needs: check-secrets
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'preview'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: 📋 Get PR information
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ github.event.inputs.pr_number }}';
            if (!prNumber) {
              core.setFailed('PR number is required for preview deployment');
              return;
            }
            
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt(prNumber)
            });
            
            core.setOutput('pr_number', pr.number);
            core.setOutput('branch', pr.head.ref);
            core.setOutput('sha', pr.head.sha);
            core.setOutput('repo', pr.head.repo.full_name);
            core.setOutput('action', 'opened');

      - name: 📤 Trigger docs preview
        id: trigger_preview
        if: needs.check-secrets.outputs.available == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          repository: ${{ secrets.DOCS_REPO }}
          event-type: docs-preview
          client-payload: |
            {
              "pr_number": "${{ steps.pr-info.outputs.pr_number }}",
              "branch": "${{ steps.pr-info.outputs.branch }}",
              "repo": "${{ steps.pr-info.outputs.repo }}",
              "sha": "${{ steps.pr-info.outputs.sha }}",
              "action": "${{ steps.pr-info.outputs.action }}"
            }

      - name: 📝 Summary
        if: always()
        run: |
          if [ "${{ needs.check-secrets.outputs.available }}" != "true" ]; then
            echo "### ⚠️ Manual Docs Preview Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Required preview deployment secrets are not configured for this run." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.trigger_preview.outcome }}" = "success" ]; then
            echo "### 🔄 Manual Docs Preview Triggered" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "A preview deployment has been triggered for PR #${{ steps.pr-info.outputs.pr_number }}." >> $GITHUB_STEP_SUMMARY
            echo "Watch for a comment on the PR with the preview URL." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**PR:** #${{ steps.pr-info.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
            echo "**Branch:** ${{ steps.pr-info.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ steps.pr-info.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.trigger_preview.outcome }}" = "failure" ]; then
            echo "### ❌ Manual Docs Preview Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The manual docs preview dispatch failed. Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Manual Docs Preview Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The manual docs preview dispatch was skipped." >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # PRODUCTION DEPLOYMENT (main → c15t.com)
  # ============================================================================
  trigger-production:
    name: 🚀 Trigger Production
    needs: check-secrets
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: 📤 Trigger production deploy
        id: trigger_production
        if: needs.check-secrets.outputs.available == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          repository: ${{ secrets.DOCS_REPO }}
          event-type: docs-production
          client-payload: |
            {
              "branch": "${{ github.ref_name }}",
              "repo": "${{ github.repository }}",
              "sha": "${{ github.sha }}"
            }

      - name: 📝 Summary
        if: always()
        run: |
          if [ "${{ needs.check-secrets.outputs.available }}" != "true" ]; then
            echo "### ⚠️ Production Deploy Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Required preview deployment secrets are not configured for this run." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.trigger_production.outcome }}" = "success" ]; then
            echo "### 🚀 Production Deploy Triggered" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Target:** https://c15t.com/docs" >> $GITHUB_STEP_SUMMARY
            echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.trigger_production.outcome }}" = "failure" ]; then
            echo "### ❌ Production Deploy Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The production deploy dispatch failed. Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Production Deploy Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The production deploy dispatch was skipped." >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # STAGING DEPLOYMENT (staging → canary.c15t.com)
  # ============================================================================
  trigger-staging:
    name: 🧪 Trigger Staging
    needs: check-secrets
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: 📤 Trigger staging deploy
        id: trigger_staging
        if: needs.check-secrets.outputs.available == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          repository: ${{ secrets.DOCS_REPO }}
          event-type: docs-staging
          client-payload: |
            {
              "branch": "${{ github.ref_name }}",
              "repo": "${{ github.repository }}",
              "sha": "${{ github.sha }}"
            }

      - name: 📝 Summary
        if: always()
        run: |
          if [ "${{ needs.check-secrets.outputs.available }}" != "true" ]; then
            echo "### ⚠️ Staging Deploy Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Required preview deployment secrets are not configured for this run." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.trigger_staging.outcome }}" = "success" ]; then
            echo "### 🧪 Staging Deploy Triggered" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Target:** https://canary.c15t.com/docs" >> $GITHUB_STEP_SUMMARY
            echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.trigger_staging.outcome }}" = "failure" ]; then
            echo "### ❌ Staging Deploy Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The staging deploy dispatch failed. Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Staging Deploy Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The staging deploy dispatch was skipped." >> $GITHUB_STEP_SUMMARY
          fi
