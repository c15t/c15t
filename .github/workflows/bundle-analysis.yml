name: Bundle Analysis

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  push:
    branches: ['main', 'canary']

env:
  TURBO_TOKEN: ${{ github.event_name == 'pull_request_target' && '' || secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ github.event_name == 'pull_request_target' && '' || secrets.TURBO_TEAM }}

jobs:
  bundle-analysis:
    name: 📦 Bundle Size Analysis
    runs-on: ubuntu-latest
    # SECURITY: Using pull_request_target with safe checkout pattern
    # This pattern is recommended by GitHub for workflows that need to analyze
    # untrusted PR code safely while keeping comment posting in a separate
    # trusted workflow.
    #
    # Security mitigations:
    # 1. Checkout BASE repository first (trusted code from main repo)
    # 2. Set up build environment using trusted base code
    # 3. Only then checkout PR code separately (untrusted)
    # 4. GITHUB_TOKEN is scoped to base repository only, preventing PR code from
    #    accessing secrets or writing to the repository
    #
    # CodeQL may still warn about executing untrusted code, but this is necessary
    # for bundle analysis. The risk is mitigated by the checkout order and token scoping.
    permissions:
      contents: read
    steps:
      # Step 1: Checkout BASE repository (trusted code from main repo)
      - name: ⬇️ Check out base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref }}
          fetch-depth: 0 # Full history needed for base branch comparison

      - name: 🔍 Detect package manager
        id: detect-pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          else
            echo "pm=bun" >> "$GITHUB_OUTPUT"
          fi

      - name: 🅿️ Setup pnpm
        if: steps.detect-pm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        if: steps.detect-pm.outputs.pm == 'pnpm'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 🟢 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11

      # Step 2: Build base branch (using trusted code)
      - name: 🏗️ Build base branch
        id: build-base
        timeout-minutes: 5
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile || bun install
            WITH_RSDOCTOR=1 bun turbo run build --filter="./packages/*" || true
          elif [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
            WITH_RSDOCTOR=1 pnpm exec turbo run build --filter="./packages/*" || true
          else
            echo "No supported lockfile found for base branch"
            exit 1
          fi
          mkdir -p .bundle-base
          # Copy rsdoctor data files
          find packages -name "rsdoctor-data.json" -exec cp --parents {} .bundle-base/ \; || true

      # Step 3: Checkout PR head (untrusted) after trusted base setup.
      # pull_request_target exposes repo secrets to the workflow; TURBO_* is cleared
      # in workflow env for this event while PR code runs.
      - name: ⬇️ Check out PR code
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          # Keep .bundle-base from the base branch so bundle analysis can compare
          clean: false
          ref: ${{ github.event.pull_request.head.sha }}
          # For fork PRs, checkout action uses GITHUB_TOKEN which has read access
          # to the PR head repository via pull_request_target event permissions

      # Step 4: Build PR branch (untrusted code runs here, but in isolated context)
      - name: 🏗️ Build current branch
        id: build-current
        timeout-minutes: 5
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile --ignore-scripts || bun install --ignore-scripts
            WITH_RSDOCTOR=1 bun turbo run build --filter="./packages/*"
          elif [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile --ignore-scripts || pnpm install --no-frozen-lockfile --ignore-scripts
            WITH_RSDOCTOR=1 pnpm exec turbo run build --filter="./packages/*"
          else
            echo "No supported lockfile found for current branch"
            exit 1
          fi

      - name: 🛠️ Build bundle analysis action
        run: bun turbo run build --filter=@c15t/bundle-analysis-action

      # Step 5: Run bundle analysis (generate report only, no comment posting)
      - name: 📊 Analyze bundle differences
        uses: ./internals/bundle-analysis-action
        with:
          base_dir: .bundle-base
          current_dir: .
          github_token: ${{ github.token }}
          pr_number: ${{ github.event.pull_request.number }}
          skip_comment: true
          fail_on_increase: false

      # Step 6: Save PR number and report for the comment workflow
      - name: 💾 Save PR metadata
        if: github.event_name == 'pull_request_target'
        run: |
          mkdir -p ./bundle-artifacts
          echo "${{ github.event.pull_request.number }}" > ./bundle-artifacts/pr-number
          cp bundle-diff.md ./bundle-artifacts/bundle-diff.md 2>/dev/null || echo "No bundle changes detected." > ./bundle-artifacts/bundle-diff.md

      - name: 📤 Upload bundle analysis artifacts
        if: github.event_name == 'pull_request_target'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis-result
          path: ./bundle-artifacts/
          if-no-files-found: ignore
          retention-days: 1
