name: Bundle Analysis

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  push:
    branches: ['main', 'canary']

jobs:
  bundle-analysis:
    name: 📦 Bundle Size Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Step 1: Checkout BASE repository first so setup/build uses trusted workflow code.
      - name: ⬇️ Check out base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref }}
          fetch-depth: 0

      - name: 🟢 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11

      # Step 2: Build base branch
      - name: 🏗️ Build base branch
        id: build-base
        timeout-minutes: 5
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: |
          if [ ! -f bun.lock ] && [ ! -f bun.lockb ]; then
            echo "No supported lockfile found for base branch"
            exit 1
          fi

          bun install --frozen-lockfile
          WITH_RSDOCTOR=1 bun turbo run build --filter="./packages/*" || true

          mkdir -p .bundle-base
          # Copy rsdoctor data files
          find packages -name "rsdoctor-data.json" -exec cp --parents {} .bundle-base/ \; || true

      # Step 3: Checkout PR code after trusted setup so only the build/analyze steps see untrusted code.
      - name: ⬇️ Check out PR code
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.pull_request.head.sha }}

      # Step 4: Build PR branch
      - name: 🏗️ Build current branch
        id: build-current
        timeout-minutes: 5
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: |
          if [ ! -f bun.lock ] && [ ! -f bun.lockb ]; then
            echo "No supported lockfile found for current branch"
            exit 1
          fi

          bun install --frozen-lockfile --ignore-scripts
          WITH_RSDOCTOR=1 bun turbo run build --filter="./packages/*"

      # Step 5: Run bundle analysis (generate report only, no comment posting)
      # NOTE: This step runs the local composite action from PR code.
      # TURBO secrets are NOT in scope here — only github.token (read-only).
      - name: 📊 Analyze bundle differences
        uses: ./internals/bundle-analysis-action
        with:
          base_dir: .bundle-base
          current_dir: .
          github_token: ${{ github.token }}
          pr_number: ${{ github.event.pull_request.number }}
          skip_comment: true
          fail_on_increase: false

      # Step 6: Save PR number and report for the comment workflow
      - name: 💾 Save PR metadata
        if: github.event_name == 'pull_request_target'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p ./bundle-artifacts
          echo "$PR_NUMBER" > ./bundle-artifacts/pr-number
          cp bundle-diff.md ./bundle-artifacts/bundle-diff.md 2>/dev/null || echo "No bundle changes detected." > ./bundle-artifacts/bundle-diff.md

      - name: 📤 Upload bundle analysis artifacts
        if: github.event_name == 'pull_request_target'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis-result
          path: ./bundle-artifacts/
          if-no-files-found: ignore
          retention-days: 1
