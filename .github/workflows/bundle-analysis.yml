name: Bundle Analysis

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  push:
    branches: ['main', 'canary']

env:
  TURBO_TOKEN: ${{ github.event_name == 'pull_request_target' && '' || secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ github.event_name == 'pull_request_target' && '' || secrets.TURBO_TEAM }}

jobs:
  bundle-analysis:
    name: 📦 Bundle Size Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ⬇️ Check out base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref }}
          fetch-depth: 0 # Full history needed for base branch comparison

      - name: 🔍 Detect package manager
        id: detect-pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          else
            echo "pm=bun" >> "$GITHUB_OUTPUT"
          fi

      - name: 🅿️ Setup pnpm
        if: steps.detect-pm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        if: steps.detect-pm.outputs.pm == 'pnpm'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 🟢 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11

      # Step 2: Build base branch (using trusted code)
      - name: 🏗️ Build base branch
        id: build-base
        timeout-minutes: 5
        run: |
          if [ ! -f bun.lock ] && [ ! -f bun.lockb ]; then
            echo "No supported lockfile found for base branch"
            exit 1
          fi

          bun install --frozen-lockfile || bun install
          WITH_RSDOCTOR=1 bun turbo run build --filter="./packages/*" || true

          mkdir -p .bundle-base
          # Copy rsdoctor data files
          find packages -name "rsdoctor-data.json" -exec cp --parents {} .bundle-base/ \; || true

      # Step 3: Checkout PR head (untrusted) after trusted base setup.
      # pull_request_target exposes repo secrets to the workflow; TURBO_* is cleared
      # in workflow env for this event while PR code runs.
      - name: ⬇️ Check out PR code
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ github.event.pull_request.head.sha }}

      # Step 4: Build PR branch
      - name: 🏗️ Build current branch
        id: build-current
        timeout-minutes: 5
        run: |
          if [ ! -f bun.lock ] && [ ! -f bun.lockb ]; then
            echo "No supported lockfile found for current branch"
            exit 1
          fi

          bun install --frozen-lockfile || bun install
          WITH_RSDOCTOR=1 bun turbo run build --filter="./packages/*"

      - name: 📊 Analyze bundle differences
        uses: ./internals/bundle-analysis-action
        with:
          base_dir: .bundle-base
          current_dir: .
          github_token: ${{ github.token }}
          pr_number: ${{ github.event.pull_request.number }}
          skip_comment: true
          fail_on_increase: false

      # Step 6: Save PR number and report for the comment workflow
      - name: 💾 Save PR metadata
        if: github.event_name == 'pull_request_target'
        run: |
          mkdir -p ./bundle-artifacts
          echo "${{ github.event.pull_request.number }}" > ./bundle-artifacts/pr-number
          cp bundle-diff.md ./bundle-artifacts/bundle-diff.md 2>/dev/null || echo "No bundle changes detected." > ./bundle-artifacts/bundle-diff.md

      - name: 📤 Upload bundle analysis artifacts
        if: github.event_name == 'pull_request_target'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis-result
          path: ./bundle-artifacts/
          if-no-files-found: ignore
          retention-days: 1
