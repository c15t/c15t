name: autofix.ci
on:
  pull_request:
  push:
    branches: ["main"]
permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out code
        uses: actions/checkout@v4

      # Setup Bun
      - name: 🟢 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.11"

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      # Cache Biome for faster formatting
      - name: ⚡ Cache Biome
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/biome
          key: ${{ runner.os }}-biome-${{ hashFiles('**/biome.json') }}
          restore-keys: |
            ${{ runner.os }}-biome-

      - name: ✨ Format code
        run: bun fmt

      - name: 📦 Format package.json
        run: bunx sort-package-json "package.json" "packages/*/package.json"

      - name: 📚 Format Docs 
        run: bun fmt:docs

      - uses: autofix-ci/action@ff86a557419858bb967097bfc916833f5647fa8c