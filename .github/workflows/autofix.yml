name: autofix.ci
on:
  pull_request:
  push:
    branches: ["main"]
permissions: {}

jobs:
  autofix:
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: ⬇️ Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Setup Bun
      - name: 🟢 Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.3.11

      - name: 📦 Install dependencies
        run: bun install

      # Cache Biome for faster formatting
      - name: ⚡ Cache Biome
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cache/biome
          key: ${{ runner.os }}-biome-${{ hashFiles('**/biome.json') }}
          restore-keys: |
            ${{ runner.os }}-biome-

      - name: ✨ Format code
        run: bun fmt

      - name: 📦 Format package.json
        run: bunx sort-package-json@3.4.0 "package.json" "packages/*/package.json"

      - name: 📚 Format Docs 
        run: bun fmt:docs

      - uses: autofix-ci/action@ff86a557419858bb967097bfc916833f5647fa8c
