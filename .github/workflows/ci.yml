name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

env:
  # Do not pass Turbo remote-cache creds when running untrusted PR code (same-repo
  # PRs still execute arbitrary branch code). Fork PRs already omit repo secrets.
  TURBO_TOKEN: ${{ github.event_name != 'pull_request' && secrets.TURBO_TOKEN || '' }}
  TURBO_TEAM: ${{ github.event_name != 'pull_request' && secrets.TURBO_TEAM || '' }}

jobs:
  lint_and_check:
    name: 🧹 Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read # Needed for checkout
      checks: write # Needed for reviewdog to post results
      pull-requests: write # Needed for reviewdog github-pr-review reporter (optional)
    steps:
      - name: ⬇️ Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2

      - name: 🟢 Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.3.11

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 👀 Type Check
        run: bun turbo run check-types

      - name: 🧹 Run Biome with Reviewdog
        uses: mongolyy/reviewdog-action-biome@0b1d65ada95594f01240e84f09ba7b8723e5ff7d
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check # Report results as checks
          level: warning               # Report errors

  build:
    name: 🏗️ Build Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read # Needed for checkout
    steps:
      - name: ⬇️ Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2

      - name: 🟢 Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.3.11

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build
        run: bun turbo run build --filter="./packages/*"

  test:
    name: 🧪 Run Tests & Coverage
    needs: build # Run only after build succeeds
    runs-on: ubuntu-latest
    permissions:
      contents: read # Needed for checkout
    steps:
      - name: ⬇️ Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2

      - name: 🟢 Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.3.11

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🎭 Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-

      - name: 🎭 Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright@1.58.2 install

      - name: 🧪 Run Tests
        run: bun turbo run test --filter="./packages/*"

      - name: ⬆️ Upload Individual Coverage Reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: individual-coverage-data # Artifact containing all raw reports
          path: |
            packages/*/coverage/coverage-summary.json
            packages/*/coverage/coverage-final.json
            apps/*/coverage/coverage-summary.json
            apps/*/coverage/coverage-final.json
            # Add other potential locations if necessary
          retention-days: 7
          # Optional: Handle case where no files are found gracefully
          if-no-files-found: warn # 'warn', 'error', or 'ignore'
