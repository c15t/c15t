name: Benchmark Regression

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/core/**'
      - 'packages/react/**'
      - 'packages/nextjs/**'
      - 'packages/translations/**'
      - 'packages/ui/**'
      - 'benchmarks/**'
      - 'package.json'
      - 'bun.lock'
      - 'bun.lockb'
      - 'turbo.json'
      - 'internals/bundle-analysis-action/**'
  push:
    branches: ['main', 'canary']
    paths:
      - 'packages/core/**'
      - 'packages/react/**'
      - 'packages/nextjs/**'
      - 'packages/translations/**'
      - 'packages/ui/**'
      - 'benchmarks/**'
      - 'package.json'
      - 'bun.lock'
      - 'bun.lockb'
      - 'turbo.json'
      - 'internals/bundle-analysis-action/**'

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Check out base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Clean benchmark output
        run: rm -rf .benchmarks .perf

      - name: Run base benchmark suite
        run: bun run bench:ci

      - name: Save base results
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .perf
          mv .benchmarks/head .perf/base

      - name: Check out PR branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Reinstall dependencies for PR branch
        if: github.event_name == 'pull_request'
        run: bun install --frozen-lockfile || bun install

      - name: Reinstall Playwright Chromium for PR branch
        if: github.event_name == 'pull_request'
        run: bunx playwright install --with-deps chromium

      - name: Run head benchmark suite
        if: github.event_name == 'pull_request'
        run: bun run bench:ci

      - name: Save head results
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .perf
          mv .benchmarks/head .perf/head

      - name: Compare benchmark reports
        if: github.event_name == 'pull_request'
        env:
          BENCHMARK_BASE_DIR: .perf/base
          BENCHMARK_HEAD_DIR: .perf/head
          BENCHMARK_COMPARE_DIR: .perf/compare
          BENCHMARK_ENFORCE: ${{ vars.C15T_BENCHMARK_ENFORCE || 'false' }}
        run: bun run bench:compare

      - name: Save PR metadata
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .perf/metadata
          echo "${{ github.event.pull_request.number }}" > .perf/metadata/pr-number

      - name: Debug perf directory contents
        if: github.event_name == 'pull_request'
        run: ls -la .perf/ && find .perf -type f | head -20 || echo "No .perf directory found"

      - name: Upload regression artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-regression-result
          path: |
            .perf/base/
            .perf/head/
            .perf/compare/
            .perf/metadata/
          if-no-files-found: warn
          retention-days: 3

      - name: Upload push artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-current
          path: .benchmarks/head/
          if-no-files-found: error
          retention-days: 3
