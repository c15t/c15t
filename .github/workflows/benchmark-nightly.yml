name: Benchmark Nightly

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  benchmark-nightly:
    name: Nightly Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright@1.60.0 install --with-deps chromium chromium-headless-shell

      - name: Clean benchmark output
        run: rm -rf .benchmarks

      - name: Run nightly benchmark suite
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: bun run bench:nightly

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: benchmark-nightly
          path: .benchmarks/nightly/
          if-no-files-found: error
          retention-days: 7
