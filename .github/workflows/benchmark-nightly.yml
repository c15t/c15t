name: Benchmark Nightly

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  benchmark-nightly:
    name: Nightly Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.6

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium chromium-headless-shell

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Clean benchmark output
        run: rm -rf .benchmarks

      - name: Run nightly benchmark suite
        run: bun run bench:nightly

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-nightly
          path: .benchmarks/nightly/
          if-no-files-found: error
          retention-days: 7
