name: Bug report
description: Report a bug in c15t
labels: ["bug", "needs-triage"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which c15t version are you on?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, environment, related issues.
    validations:
      required: false
