name: Documentation issue
description: Report a problem with the c15t docs
labels: ["documentation", "needs-triage"]
body:
  - type: input
    id: page
    attributes:
      label: Page URL
      placeholder: https://c15t.com/docs/...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What's wrong?
      description: Quote the relevant section and explain the issue.
    validations:
      required: true

  - type: textarea
    id: suggested
    attributes:
      label: Suggested change
    validations:
      required: false
